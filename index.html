<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Тобі послання!</title>
    <style>
        body {
            background-color: #FFC0CB; /* Рожевий фон */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: "Times New Roman", Times, serif;
        }

        /* Початкове вікно */
        #step1 {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 100;
            text-align: center;
        }

        .btn-ok {
            margin-top: 15px;
            padding: 10px 30px;
            cursor: pointer;
            background: #FF0000;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14pt;
            transition: 0.3s;
        }
        .btn-ok:hover { transform: scale(1.1); }

        /* Паперовий літачок */
        #plane {
            display: none;
            position: absolute;
            font-size: 50px;
            z-index: 150;
            pointer-events: none;
        }

        /* Анімація польоту літачка */
        .fly-animation {
            display: block !important;
            animation: flyIn 2s ease-in-out forwards;
        }

        @keyframes flyIn {
            0% { 
                bottom: -50px; 
                right: -50px; 
                transform: rotate(0deg) scale(1); 
            }
            100% { 
                bottom: 50%; 
                right: 50%; 
                /* Літачок підлітає до центру і нахиляється */
                transform: translate(50%, 50%) rotate(-45deg) scale(1.5);
                opacity: 0;
            }
        }

        /* Аркуш паперу (листівка) */
        #paper-card {
            display: none;
            background: white;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 50;
            text-align: center;
            width: 280px;
            border-radius: 2px;
            position: absolute;
            transform: scale(0);
        }

        /* Анімація розгортання паперу */
        .unfold-animation {
            display: block !important;
            animation: unfold 0.6s ease-out 1.9s forwards;
        }

        @keyframes unfold {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        #cat-img { width: 100%; border-radius: 5px; margin-top: 10px; }

        /* Червоні сердечка */
        .heart {
            position: absolute;
            bottom: -50px;
            color: red;
            font-size: 20px;
            animation: moveUp 5s linear infinite;
            z-index: 1;
        }

        @keyframes moveUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="step1">
        <div style="font-size: 18pt;">Не скучай</div>
        <button class="btn-ok" onclick="launch()">ОК</button>
    </div>

    <div id="plane">✈️</div>

    <div id="paper-card">
        <div style="font-size: 16pt; font-weight: bold;">Привіт!</div>
        <img id="cat-img" src="https://cataas.com/cat/cute" alt="Котик">
    </div>

    <script>
        function launch() {
            // Прибираємо вікно "Не скучай"
            document.getElementById('step1').style.display = 'none';
            
            // Запускаємо літачок
            const plane = document.getElementById('plane');
            plane.classList.add('fly-animation');
            
            // Запускаємо появу паперу (вона почнеться через 1.9 сек)
            const paper = document.getElementById('paper-card');
            paper.classList.add('unfold-animation');
        }

        // Функція для сердечок
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 400);
    </script>
</body>
</html>
