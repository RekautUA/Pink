<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тобі літачок!</title>
    <style>
        body {
            background-color: #FFC0CB; /* Рожевий фон */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: "Times New Roman", Times, serif;
        }

        /* Стиль для першого вікна */
        .modal {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 10;
            text-align: center;
            transition: opacity 0.5s;
        }

        .btn-ok {
            margin-top: 15px;
            padding: 8px 25px;
            cursor: pointer;
            background: #FF99AA;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 12pt;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-ok:hover { background: #FF7788; }

        /* Паперовий літачок (спочатку схований за межами екрану) */
        #plane {
            display: none;
            position: absolute;
            font-size: 50px; /* Розмір літачка */
            color: white;
            z-index: 20;
            transform: rotate(0deg);
        }

        /* Клас для анімації польоту літачка */
        .fly-animation {
            display: block !important;
            animation: flyIn 2.5s ease-out forwards;
        }

        /* Анімація польоту з кута в центр + перетворення */
        @keyframes flyIn {
            0% {
                bottom: -100px;
                right: -100px;
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
            70% {
                /* Долітає до центру */
                bottom: calc(50% - 25px);
                right: calc(50% - 25px);
                transform: scale(1) rotate(-45deg);
                opacity: 1;
            }
            85% {
                /* Починає "розгортатися" (крутитися і збільшуватися) */
                bottom: calc(50% - 25px);
                right: calc(50% - 25px);
                transform: scale(2) rotate(180deg);
                opacity: 0.5;
