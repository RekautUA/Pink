<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Для тебе</title>
    <style>
        body {
            /* Більш насичений рожевий фон */
            background-color: #FFC0CB; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* Біле віконце з текстом */
        .modal {
            background-color: white;
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 10;
            
            font-family: "Times New Roman", Times, serif;
            font-size: 14pt;
            color: #333;
            text-align: center;
        }

        /* Червоні сердечка */
        .heart {
            position: absolute;
            bottom: -50px;
            color: #FF0000; /* Яскраво-червоний колір */
            font-size: 20px;
            user-select: none;
            animation: moveUp 6s linear infinite;
            opacity: 0.8;
            pointer-events: none; /* Щоб сердечка не заважали натискати на екран */
        }

        @keyframes moveUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.9;
            }
            100% {
                transform: translateY(-115vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="modal">
        Не скучай
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤'; 
            
            // Випадкова позиція по всій ширині екрану
            heart.style.left = Math.random() * 100 + "vw";
            
            // Випадкова швидкість польоту
            heart.style.animationDuration = Math.random() * 3 + 4 + "s";
            
            // Випадковий розмір сердечок
            heart.style.fontSize = Math.random() * 15 + 15 + "px";
            
            document.body.appendChild(heart);
            
            // Видаляємо сердечко через 7 секунд
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        // Створювати сердечко кожні 600 мілісекунд (трішки частіше)
        setInterval(createHeart, 600);
    </script>

</body>
</html>
