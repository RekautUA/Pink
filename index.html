<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Тобі послання!</title>
    <style>
        body {
            background-color: #FFC0CB; /* Рожевий фон */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: "Times New Roman", Times, serif;
        }

        /* Початкове вікно */
        #step1 {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 100;
            text-align: center;
            transition: opacity 0.5s;
        }

        .btn-ok {
            margin-top: 15px;
            padding: 10px 30px;
            cursor: pointer;
            background: #FF0000;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14pt;
            transition: 0.3s;
        }
        .btn-ok:hover { transform: scale(1.1); }

        /* Анімація польоту та розгортання (GIF) */
        #plane-gif {
            display: none; /* Спочатку сховано */
            position: absolute;
            z-index: 50;
            /* Розміщуємо по центру */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; /* Розмір анімації */
            height: auto;
            pointer-events: none;
        }

        /* Аркуш паперу (листівка з котиком) */
        #paper-card {
            display: none; /* Спочатку сховано */
            background: white;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 40;
            text-align: center;
            width: 280px;
            border-radius: 2px; /* Гострі кути, як у паперу */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
        }

        /* Клас для появи паперу після анімації */
        .show-paper {
            display: block !important;
            animation: finalAppear 0.5s ease-out forwards;
        }

        @keyframes finalAppear {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        #cat-img { width: 100%; border-radius: 5px; margin-top: 10px; }

        /* Червоні сердечка */
        .heart {
            position: absolute;
            bottom: -50px;
            color: red;
            font-size: 20px;
            animation: moveUp 5s linear infinite;
            z-index: 1;
        }

        @keyframes moveUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="step1">
        <div style="font-size: 18pt;">Не скучай</div>
        <button class="btn-ok" onclick="launchSequence()">ОК</button>
    </div>

    <img id="plane-gif" src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3VxdXAzbnU3YzU2azR6bm92N3d5NHJnbHR6d3V3azdzbnk4czByaiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/X83Lw42c54t1nwnb8L/giphy.gif" alt="Літачок летить">

    <div id="paper-card">
        <div style="font-size: 16pt; font-weight: bold;">Мур!</div>
        <img id="cat-img" src="https://cataas.com/cat/cute" alt="Котик">
    </div>

    <script>
        function launchSequence() {
            // 1. Ховаємо перше вікно
            document.getElementById('step1').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('step1').style.display = 'none';
            }, 500);

            // 2. Показуємо GIF анімацію літачка
            const gif = document.getElementById('plane-gif');
            setTimeout(() => {
                gif.style.display = 'block';
            }, 600); // Невелика затримка після зникнення вікна

            // 3. Через 2.5 секунди (час польоту та розгортання в GIF) 
            // ховаємо GIF і показуємо справжній аркуш з котиком
            setTimeout(() => {
                gif.style.display = 'none';
                document.getElementById('paper-card').classList.add('show-paper');
            }, 3100); // 600ms затримка + 2500ms анімація
        }

        // Функція для сердечок
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 400);
    </script>
</body>
</html>
